<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU MARKET PRO</title>

<style>
body { font-family:Arial; background:#111; color:#fff; padding:10px; }
h1 { text-align:center; color:#00d084; }

input, button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px;
}

button { background:#00d084; color:white; cursor:pointer; }

.card {
 background:#222;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}

.tabs button { width:24%; }
.page { display:none; }

.small-info{
 background:#1a1a1a;
 padding:10px;
 border-radius:10px;
 margin:10px 0;
 color:#00d084;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none">

<h1>🛒 ATEŞOĞLU MARKET PRO</h1>

<div class="small-info">
💰 KASA: <b id="kasaText">0</b> ₺
<button onclick="kasaSifirla()">Kasayı Sıfırla</button>
</div>

<div class="tabs">
<button onclick="show('urun')">Ürün</button>
<button onclick="show('satis')">Satış</button>
<button onclick="show('barkod')">Barkod</button>
<button onclick="show('rapor')">Rapor</button>
</div>

<!-- ÜRÜN -->
<div id="urun" class="page">
<input id="ad" placeholder="Ürün adı">
<input id="fiyat" type="number" placeholder="Fiyat">
<input id="stok" type="number" placeholder="Stok">
<input id="kod" placeholder="Barkod">

<button onclick="urunEkle()">Ekle</button>
<button onclick="tumStokSifirla()">Tüm Stokları Sıfırla</button>

<div id="urunList"></div>
</div>

<!-- SATIŞ -->
<div id="satis" class="page">
<input id="ara" placeholder="Ara" onkeyup="filtre()">

<div id="urunSec"></div>

<h3>Sepet</h3>
<div id="sepet"></div>

<h3>Toplam: <span id="toplam">0</span> ₺</h3>

<button onclick="odemeTip='Nakit'">Nakit</button>
<button onclick="odemeTip='POS'">POS</button>

<button onclick="satis()">Satışı Bitir</button>

<div id="fatura" class="card"></div>
</div>

<!-- RAPOR -->
<div id="rapor" class="page">
<canvas id="chart"></canvas>

<div id="raporPanel" class="card"></div>

<button onclick="raporSifirla()">Raporu Sıfırla</button>
<button onclick="grafikSifirla()">Grafiği Sıfırla</button>
</div>

</div>

<script>

let urunler = JSON.parse(localStorage.getItem("urunler")) || [];
let sepet = [];
let kasa = Number(localStorage.getItem("kasa")) || 0;
let satislar = JSON.parse(localStorage.getItem("satislar")) || [];
let odemeTip = null;

function save(){
 localStorage.setItem("urunler", JSON.stringify(urunler));
 localStorage.setItem("kasa", kasa);
 localStorage.setItem("satislar", JSON.stringify(satislar));
}

function login(){
 if(user.value=="admin" && pass.value=="1234"){
  loginPage.style.display="none";
  app.style.display="block";
  show("urun");
 }
}

function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
 render();
}

// ➕ ÜRÜN EKLE
function urunEkle(){
 urunler.push({
  ad: ad.value,
  fiyat: Number(fiyat.value),
  stok: Number(stok.value),
  kod: kod.value
 });
 save(); render();
}

// 🛒 ADETLİ EKLE
function sepeteEkle(i){

 let miktar = prompt("Kaç adet?");
 if(!miktar) return;

 miktar = Number(miktar);

 if(urunler[i].stok < miktar){
  alert("Yetersiz stok!");
  return;
 }

 sepet.push({
  ad: urunler[i].ad,
  fiyat: urunler[i].fiyat,
  adet: miktar
 });

 render();
}

// 💰 SATIŞ
function satis(){

 if(!odemeTip) return alert("Ödeme tipi seç");
 if(sepet.length===0) return alert("Sepet boş");

 let toplamTutar = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);
 let tarih = new Date().toLocaleString();

 fatura.innerHTML = `
 <h3>FATURA</h3>
 ${sepet.map(s=>`${s.ad} x ${s.adet}`).join("<br>")}
 <hr>
 ${toplamTutar} ₺
 <br>${tarih}
 `;

 sepet.forEach(s=>{
  let u = urunler.find(x=>x.ad==s.ad);
  if(u) u.stok -= s.adet;
 });

 kasa += toplamTutar;

 satislar.push({
  tarih,
  toplam: toplamTutar,
  urunler: sepet
 });

 sepet=[];
 odemeTip=null;

 save();
 render();
}

// 📊 RAPOR
function raporRender(){

 let gelir = satislar.reduce((a,b)=>a+b.toplam,0);

 let urunMap = {};

 satislar.forEach(s=>{
  s.urunler.forEach(u=>{
   urunMap[u.ad] = (urunMap[u.ad]||0)+u.adet;
  });
 });

 raporPanel.innerHTML = `
 Toplam Gelir: ${gelir} ₺<br>
 ${Object.entries(urunMap).map(x=>x[0]+" : "+x[1]).join("<br>")}
 `;
}

// 🧨 RAPOR SIFIRLA
function raporSifirla(){
 if(!confirm("Rapor silinecek")) return;
 satislar=[];
 save(); render();
}

// 📉 GRAFİK SIFIRLA
function grafikSifirla(){
 if(!confirm("Grafik sıfırlanacak")) return;
 kasa=0;
 save(); render();
}

// 💰 KASA SIFIRLA
function kasaSifirla(){
 kasa=0;
 save(); render();
}

// 📊 RENDER
function render(){

 kasaText.innerText = kasa;

 urunList.innerHTML = urunler.map((u,i)=>
 `<div class="card">${u.ad} - ${u.fiyat}₺ - Stok:${u.stok}</div>`
 ).join("");

 urunSec.innerHTML = urunler.map((u,i)=>
 `<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`
 ).join("");

 sepet.innerHTML = sepet.map(s=>
 `<div class="card">${s.ad} x ${s.adet}</div>`
 ).join("");

 toplam.innerText = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);

 raporRender();
}

// 🔍 ARAMA
function filtre(){
 let q = ara.value.toLowerCase();
 urunSec.innerHTML = urunler
 .filter(u=>u.ad.toLowerCase().includes(q))
 .map((u,i)=>`<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`)
 .join("");
}

show("urun");

</script>

</body>
</html>
