<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU MARKET PRO</title>

<style>
body { font-family:Arial; background:#111; color:#fff; padding:10px; }
h1 { text-align:center; color:#00d084; }
input, button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; }
button { background:#00d084; color:white; cursor:pointer; }
.card { background:#222; padding:10px; margin-top:10px; border-radius:10px; }
.page { display:none; }
.small-info{ background:#1a1a1a; padding:10px; border-radius:10px; margin:10px 0; color:#00d084; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none">

<h1>🛒 ATEŞOĞLU MARKET PRO</h1>

<div class="small-info">
💰 KASA: <b id="kasaText">0</b> ₺
<button onclick="kasaSifirla()">Kasayı Sıfırla</button>
</div>

<button onclick="show('urun')">Ürün</button>
<button onclick="show('satis')">Satış</button>

<!-- ÜRÜN -->
<div id="urun" class="page">
<input id="ad" placeholder="Ürün adı">
<input id="fiyat" type="number" placeholder="Fiyat">
<input id="stok" type="number" placeholder="Stok">

<button onclick="urunEkle()">Ekle</button>
<div id="urunList"></div>
</div>

<!-- SATIŞ -->
<div id="satis" class="page">

<div id="urunSec"></div>

<h3>🛒 Sepet</h3>
<div id="sepet"></div>

<h3>Toplam: <span id="toplam">0</span> ₺</h3>

<button onclick="satis()">Satışı Bitir</button>

<div id="fatura" class="card"></div>

</div>

</div>

<script>

let urunler = JSON.parse(localStorage.getItem("urunler")) || [];
let sepet = [];
let kasa = Number(localStorage.getItem("kasa")) || 0;

// LOGIN
function login(){
 if(user.value=="admin" && pass.value=="1234"){
  loginPage.style.display="none";
  app.style.display="block";
  show("urun");
 }
}

// SAYFA
function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
 render();
}

// SAVE
function save(){
 localStorage.setItem("urunler", JSON.stringify(urunler));
 localStorage.setItem("kasa", kasa);
}

// ÜRÜN EKLE
function urunEkle(){
 urunler.push({
  ad: ad.value,
  fiyat: Number(fiyat.value),
  stok: Number(stok.value)
 });
 save(); render();
}

// 🛒 EKLE (AKILLI)
function sepeteEkle(i){

 let u = urunler[i];

 if(u.stok <= 0){
  alert("Stok yok");
  return;
 }

 let mevcut = sepet.find(x=>x.ad == u.ad);

 if(mevcut){
  if(mevcut.adet >= u.stok){
   alert("Stok sınırı");
   return;
  }
  mevcut.adet++;
 } else {
  sepet.push({
   ad: u.ad,
   fiyat: u.fiyat,
   adet: 1
  });
 }

 render();
}

// ➕
function adetArtir(i){
 let u = urunler.find(x=>x.ad == sepet[i].ad);

 if(sepet[i].adet >= u.stok){
  alert("Stok bitti");
  return;
 }

 sepet[i].adet++;
 render();
}

// ➖
function adetAzalt(i){
 sepet[i].adet--;

 if(sepet[i].adet <= 0){
  sepet.splice(i,1);
 }

 render();
}

// SATIŞ
function satis(){

 if(sepet.length===0){
  alert("Sepet boş");
  return;
 }

 let toplamTutar = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);

 sepet.forEach(s=>{
  let u = urunler.find(x=>x.ad==s.ad);
  if(u) u.stok -= s.adet;
 });

 kasa += toplamTutar;
 sepet = [];

 save();
 render();
}

// RENDER
function render(){

 kasaText.innerText = kasa;

 urunList.innerHTML = urunler.map(u=>
 `<div class="card">${u.ad} - ${u.stok}</div>`
 ).join("");

 urunSec.innerHTML = urunler.map((u,i)=>
 `<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`
 ).join("");

 sepet.innerHTML = sepet.map((s,i)=>
 `<div class="card">
  ${s.ad} <br>
  ${s.adet} x ${s.fiyat}₺
  <br>
  <button onclick="adetArtir(${i})">➕</button>
  <button onclick="adetAzalt(${i})">➖</button>
 </div>`
 ).join("");

 toplam.innerText = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);
}

show("urun");

</script>

</body>
</html>
