<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU MARKET PRO SAAS</title>

<style>
body{font-family:Arial;background:#111;color:#fff;padding:10px}
h1{text-align:center;color:#00d084}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{background:#00d084;color:#fff}
.card{background:#222;padding:10px;margin:10px 0;border-radius:10px}
.page{display:none}
.small{background:#1a1a1a;padding:10px;border-radius:10px;margin:10px 0;color:#00d084}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body>

<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none">

<h1>🛒 MARKET PRO SAAS</h1>

<div class="small">
💰 Nakit: <span id="nakit">0</span> ₺ |
💳 POS: <span id="pos">0</span> ₺
</div>

<button onclick="show('urun')">Ürün</button>
<button onclick="show('satis')">Satış</button>
<button onclick="show('rapor')">Rapor</button>

<!-- ÜRÜN -->
<div id="urun" class="page">
<input id="ad" placeholder="Ürün">
<input id="fiyat" type="number" placeholder="Fiyat">
<input id="stok" type="number" placeholder="Stok">
<button onclick="urunEkle()">Ekle</button>
<div id="urunList"></div>
</div>

<!-- SATIŞ -->
<div id="satis" class="page">

<input id="musteri" placeholder="Müşteri">

<div id="urunSec"></div>

<h3>Sepet</h3>
<div id="sepet"></div>

<h3>Toplam: <span id="toplam">0</span> ₺</h3>

<button onclick="odeme='Nakit'">Nakit</button>
<button onclick="odeme='POS'">POS</button>
<button onclick="satis()">Sat</button>

<div id="fatura" class="card"></div>
</div>

<!-- RAPOR -->
<div id="rapor" class="page">
<div id="raporPanel"></div>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey:"XXX",
 projectId:"XXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// DATA
let urunler=[];
let sepet=[];
let odeme=null;
let nakit=0;
let pos=0;

// LOGIN
function login(){
 document.getElementById("loginPage").style.display="none";
 document.getElementById("app").style.display="block";
 urunleriGetir();
}

// SAYFA
function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
 render();
}

// ÜRÜN GETİR
async function urunleriGetir(){
 let snap=await db.collection("urunler").get();
 urunler=snap.docs.map(d=>({id:d.id,...d.data()}));
 render();
}

// ÜRÜN EKLE
async function urunEkle(){
 await db.collection("urunler").add({
  ad:ad.value,
  fiyat:Number(fiyat.value),
  stok:Number(stok.value)
 });
 urunleriGetir();
}

// SEPET EKLE
function sepeteEkle(i){
 let u=urunler[i];
 if(u.stok<=0) return;

 let m=sepet.find(x=>x.ad==u.ad);
 if(m) m.adet++;
 else sepet.push({id:u.id,ad:u.ad,fiyat:u.fiyat,adet:1});

 render();
}

// SATIŞ
async function satis(){

 if(!odeme) return;

 let toplam=sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);

 await db.collection("satislar").add({
  musteri:musteri.value||"Bilinmiyor",
  toplam,
  odeme,
  tarih:new Date().toISOString(),
  urunler:sepet
 });

 for(let s of sepet){
  let ref=db.collection("urunler").doc(s.id);
  let d=await ref.get();
  let stok=d.data().stok-s.adet;
  await ref.update({stok});
 }

 if(odeme=="Nakit") nakit+=toplam;
 else pos+=toplam;

 sepet=[];
 odeme=null;
 urunleriGetir();
}

// RENDER
function render(){

 document.getElementById("nakit").innerText=nakit;
 document.getElementById("pos").innerText=pos;

 document.getElementById("urunList").innerHTML=
 urunler.map((u,i)=>
 `<div class="card">${u.ad} - ${u.stok}</div>`
 ).join("");

 document.getElementById("urunSec").innerHTML=
 urunler.map((u,i)=>
 `<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`
 ).join("");

 document.getElementById("sepet").innerHTML=
 sepet.map(s=>
 `<div class="card">${s.ad} ${s.adet}x${s.fiyat}</div>`
 ).join("");

 document.getElementById("toplam").innerText=
 sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);

 document.getElementById("raporPanel").innerHTML=`
 Nakit: ${nakit} ₺<br>
 POS: ${pos} ₺<br>
 Satış sistemi aktif
 `;
}
</script>

</body>
</html>
