<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çılgın Pilavcı V4</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:white}
header{background:linear-gradient(90deg,orange,#ff5e00);padding:15px;text-align:center}
header h1{margin:0;color:black}

nav{display:flex;gap:5px;padding:10px;background:#1a1a1a}
nav button{flex:1;padding:10px;border:none;background:orange;font-weight:bold;cursor:pointer}

section{display:none;padding:10px}
.active{display:block}

.card{background:#1c1c1c;border:1px solid orange;padding:10px;margin:5px 0;border-radius:10px}
input{width:100%;padding:10px;margin:5px 0}

.badge{color:orange;font-weight:bold}
</style>
</head>

<body>

<header>
<h1>🔥 ÇILGIN PİLAVCI V4 🔥</h1>
</header>

<nav>
<button onclick="show('menu')">Menu</button>
<button onclick="show('cart')">Sepet</button>
<button onclick="show('admin')">Admin</button>
<button onclick="show('orders')">Siparişler</button>
</nav>

<!-- MENU -->
<section id="menu" class="active"></section>

<!-- CART -->
<section id="cart">
<h2>Sepet</h2>
<div id="cartList"></div>
<h3 id="total">Toplam: 0 TL</h3>
<button onclick="createOrder()">Sipariş Ver</button>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>Admin Panel</h2>

<input id="loginPass" placeholder="Admin şifre">
<button onclick="login()">Giriş</button>

<div id="adminPanel" style="display:none">
<input id="pname" placeholder="Ürün adı">
<input id="pprice" placeholder="Fiyat">
<button onclick="addProduct()">Ürün Ekle</button>
<div id="adminList"></div>
</div>

</section>

<!-- ORDERS -->
<section id="orders">
<h2>Siparişler</h2>
<div id="orderList"></div>
</section>

<script>

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* DATA */
let cart = [];
let products = [];
let isAdmin = false;
let orderCounter = 1000;

/* NAV */
function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* LOGIN */
function login(){
    let pass=document.getElementById("loginPass").value;
    if(pass==="1234"){
        isAdmin=true;
        document.getElementById("adminPanel").style.display="block";
        alert("Admin giriş başarılı 🔥");
    }else{
        alert("Hatalı şifre");
    }
}

/* PRODUCTS */
function loadProducts(){
    db.collection("products").onSnapshot(snap=>{
        products=[];
        let html="";

        snap.forEach(doc=>{
            let d=doc.data();
            products.push({id:doc.id,...d});

            html+=`
            <div class="card">
                <b>${d.name}</b><br>
                ${d.price} TL<br><br>
                <button onclick="addCart('${doc.id}')">Ekle</button>
            </div>`;
        });

        document.getElementById("menu").innerHTML=html;
        renderAdmin();
    });
}

/* CART */
function addCart(id){
    let p=products.find(x=>x.id===id);
    cart.push(p);
    renderCart();
}

function renderCart(){
    let html="";
    let total=0;

    cart.forEach(c=>{
        total+=Number(c.price);
        html+=`<div>${c.name} - ${c.price} TL</div>`;
    });

    document.getElementById("cartList").innerHTML=html;
    document.getElementById("total").innerText="Toplam: "+total+" TL";
}

/* ORDER */
function createOrder(){
    if(cart.length===0) return alert("Sepet boş!");

    orderCounter++;

    db.collection("orders").add({
        orderNo:orderCounter,
        items:cart,
        status:"Hazırlanıyor",
        time:Date.now()
    });

    cart=[];
    renderCart();
}

/* ADMIN */
function addProduct(){
    let name=document.getElementById("pname").value;
    let price=document.getElementById("pprice").value;

    db.collection("products").add({
        name,
        price:Number(price)
    });
}

/* ORDERS */
function loadOrders(){
    db.collection("orders").orderBy("time","desc")
    .onSnapshot(snap=>{
        let html="";

        snap.forEach(doc=>{
            let d=doc.data();

            html+=`
            <div class="card">
                <span class="badge">#${d.orderNo}</span><br>
                ${d.items.map(i=>i.name).join(", ")}<br>
                <b>${d.status}</b>
            </div>`;
        });

        document.getElementById("orderList").innerHTML=html;
    });
}

/* INIT */
loadProducts();
loadOrders();

</script>

</body>
</html>
