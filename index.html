<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Çılgın Pilavcı PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

header{
    background:linear-gradient(90deg,orange,#ff5e00);
    padding:15px;
    text-align:center;
}
header h1{margin:0;color:black}

nav{
    display:flex;
    gap:5px;
    padding:10px;
    background:#1a1a1a;
}
nav button{
    flex:1;
    padding:10px;
    border:none;
    background:orange;
    font-weight:bold;
    cursor:pointer;
}

section{display:none;padding:10px}
.active{display:block}

/* MENU */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card{
    background:#1c1c1c;
    border:1px solid orange;
    padding:10px;
    border-radius:10px;
}

button{
    cursor:pointer;
}

/* CART */
.cart{
    background:#1a1a1a;
    padding:10px;
    border-radius:10px;
    border:1px solid orange;
}

/* ADMIN */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

/* ORDERS */
.order{
    background:#222;
    padding:10px;
    margin:5px 0;
    border-left:4px solid orange;
}
.small{
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>🔥 ÇILGIN PİLAVCI PRO 🔥</h1>
</header>

<nav>
<button onclick="show('menu')">Menu</button>
<button onclick="show('cart')">Sepet</button>
<button onclick="show('admin')">Admin</button>
<button onclick="show('kitchen')">Mutfak</button>
</nav>

<!-- MENU -->
<section id="menu" class="active">
<h2>Menü</h2>
<div class="grid" id="menuList"></div>
</section>

<!-- CART -->
<section id="cart">
<h2>Sepet</h2>
<div class="cart" id="cartList"></div>
<h3 id="total">Toplam: 0 TL</h3>
<button onclick="createOrder()">Siparişi Gönder</button>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>Admin Panel</h2>

<input id="name" placeholder="Ürün adı">
<input id="price" placeholder="Fiyat">
<button onclick="addProduct()">Ürün Ekle</button>

<hr>

<div id="adminList"></div>
</section>

<!-- KITCHEN -->
<section id="kitchen">
<h2>Mutfak Paneli</h2>
<div id="orders"></div>
</section>

<script>

let menu = JSON.parse(localStorage.getItem("menu")) || [
    {name:"Tavuk Pilav",price:80},
    {name:"Double Pilav",price:110},
    {name:"Ayran",price:20}
];

let cart = [];
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function save(){
    localStorage.setItem("menu",JSON.stringify(menu));
    localStorage.setItem("orders",JSON.stringify(orders));
}

/* NAV */
function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    renderAll();
}

/* MENU */
function renderMenu(){
    let html="";
    menu.forEach((m,i)=>{
        html+=`
        <div class="card">
            <b>${m.name}</b><br>
            ${m.price} TL<br><br>
            <button onclick="addCart(${i})">Ekle</button>
        </div>`;
    });
    document.getElementById("menuList").innerHTML=html;
}

function addCart(i){
    cart.push(menu[i]);
    renderCart();
}

/* CART */
function renderCart(){
    let html="";
    let total=0;

    cart.forEach((c,i)=>{
        total+=c.price;
        html+=`
        <div>
            ${c.name} - ${c.price} TL
        </div>`;
    });

    document.getElementById("cartList").innerHTML=html;
    document.getElementById("total").innerText="Toplam: "+total+" TL";
}

function createOrder(){
    if(cart.length==0) return alert("Sepet boş!");

    let order = {
        id:Date.now(),
        items:[...cart],
        status:"Hazırlanıyor"
    };

    orders.push(order);
    cart=[];
    save();
    alert("Sipariş alındı!");
    renderAll();
}

/* ADMIN */
function addProduct(){
    let n=document.getElementById("name").value;
    let p=parseInt(document.getElementById("price").value);

    if(!n||!p) return;

    menu.push({name:n,price:p});
    save();
    renderAll();
}

function deleteProduct(i){
    menu.splice(i,1);
    save();
    renderAll();
}

function renderAdmin(){
    let html="";
    menu.forEach((m,i)=>{
        html+=`
        <div class="card">
            ${m.name} - ${m.price} TL
            <button onclick="deleteProduct(${i})">Sil</button>
        </div>`;
    });
    document.getElementById("adminList").innerHTML=html;
}

/* KITCHEN */
function finishOrder(id){
    orders = orders.map(o=>{
        if(o.id==id) o.status="Hazırlandı";
        return o;
    });
    save();
    renderAll();
}

function renderKitchen(){
    let html="";
    orders.forEach(o=>{
        html+=`
        <div class="order">
            <b>#${o.id}</b><br>
            ${o.items.map(i=>i.name).join(", ")}<br>
            <span class="small">${o.status}</span><br><br>
            <button onclick="finishOrder(${o.id})">Hazırlandı</button>
        </div>`;
    });
    document.getElementById("orders").innerHTML=html;
}

/* MAIN */
function renderAll(){
    renderMenu();
    renderCart();
    renderAdmin();
    renderKitchen();
}

renderAll();

</script>

</body>
</html>
